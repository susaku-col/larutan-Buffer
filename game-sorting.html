<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab Sorting - ChemBufferLab</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <!-- PATH DIPERBAIKI -->
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .dragging { opacity: 0.5; transform: scale(1.05); }
    .drag-over { border-color: #22d3ee !important; background: rgba(34, 211, 238, 0.1); }
    .correct-drop { animation: correctPulse 0.5s ease; }
    .wrong-drop { animation: wrongShake 0.5s ease; }
    @keyframes correctPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); background: rgba(34, 197, 94, 0.2); } }
    @keyframes wrongShake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
  </style>
  <script> tailwind.config = { theme: { extend: { fontFamily: { display: ['Space Grotesk', 'sans-serif'], body: ['DM Sans', 'sans-serif'] }, colors: { primary: '#0d9488', accent: '#22d3ee', dark: '#0f172a', darker: '#020617', card: '#1e293b', muted: '#94a3b8' } } } } </script>
</head>
<body class="min-h-screen bg-darker">
  
  <!-- NAVBAR -->
  <header class="fixed top-0 left-0 right-0 z-50 bg-darker/80 backdrop-blur-xl border-b border-border h-16">
    <nav class="max-w-7xl mx-auto px-4 h-full flex items-center justify-between">
      <a href="game.html" class="flex items-center gap-3 group">
        <svg class="w-6 h-6 text-muted group-hover:text-white transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 17l-5-5m0 0l5-5m-5 5h12"/></svg>
        <span class="font-display font-bold text-lg text-muted group-hover:text-white transition-colors">Back to Menu</span>
      </a>
    </nav>
  </header>

  <!-- MAIN CONTENT -->
  <main class="relative z-10 pt-20 px-4 pb-10">
    <div class="max-w-6xl mx-auto">
      <div class="text-center mb-8">
        <h1 class="font-display text-3xl font-bold mb-2">Lab Sorting</h1>
        <p class="text-muted">Seret dan lepas pasangan senyawa ke dalam kategori yang benar.</p>
      </div>

      <!-- Score -->
      <div class="flex justify-center gap-4 mb-8">
        <div class="px-4 py-2 rounded-xl bg-card border border-border text-sm">
          Skor: <span class="font-bold text-accent" id="score">0</span>
        </div>
        <div class="px-4 py-2 rounded-xl bg-card border border-border text-sm">
          Sisa: <span class="font-bold text-yellow-400" id="items-left">0</span>
        </div>
      </div>

      <!-- Game Area -->
      <div class="grid md:grid-cols-2 gap-8 mb-8">
        <!-- Source Tray (Soal) -->
        <div class="bg-card rounded-2xl border border-border p-4 min-h-[400px] flex flex-wrap content-start gap-3 justify-center" id="source-tray">
          <!-- Items generated by JS -->
        </div>

        <!-- Target Zones -->
        <div class="space-y-4">
          <div class="drop-zone bg-dark rounded-xl border-2 border-dashed border-border p-4" data-category="buffer-asam">
            <h4 class="font-display text-sm font-semibold text-green-400 mb-3 text-center">Larutan Penyangga Asam</h4>
            <div class="grid grid-cols-2 gap-2 min-h-[50px]"></div>
          </div>
          <div class="drop-zone bg-dark rounded-xl border-2 border-dashed border-border p-4" data-category="buffer-basa">
            <h4 class="font-display text-sm font-semibold text-blue-400 mb-3 text-center">Larutan Penyangga Basa</h4>
            <div class="grid grid-cols-2 gap-2 min-h-[50px]"></div>
          </div>
          <div class="drop-zone bg-dark rounded-xl border-2 border-dashed border-border p-4" data-category="bukan-buffer">
            <h4 class="font-display text-sm font-semibold text-red-400 mb-3 text-center">Bukan Penyangga</h4>
            <div class="grid grid-cols-2 gap-2 min-h-[50px]"></div>
          </div>
        </div>
      </div>
      <div class="text-center">
          <button onclick="resetGame()" class="btn-secondary px-6 py-2 rounded-lg text-sm">Ulangi Game</button>
      </div>
    </div>
  </main>

  <!-- PATH DIPERBAIKI -->
  <script src="assets/js/game-sorting.js"></script>
</body>
</html>
